name: Publish template to platform R2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "published_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        run: |
          set -euo pipefail
          # Write the tarball OUTSIDE the source tree to avoid the classic
          # `tar: .: file changed as we read it` error (tar sees its own
          # output file appearing in the directory it's archiving).
          tar --exclude='./.git' \
              --exclude='./.github' \
              --exclude='./node_modules' \
              --exclude='./.next' \
              --exclude='./.env' \
              --exclude='./.env.*' \
              --exclude='./.mcp.json' \
              -czf "${RUNNER_TEMP}/template.tar.gz" .
          ls -lh "${RUNNER_TEMP}/template.tar.gz"

      - name: Build manifest
        run: |
          set -euo pipefail
          SIZE=$(wc -c < "${RUNNER_TEMP}/template.tar.gz" | tr -d ' ')
          SHA256=$(shasum -a 256 "${RUNNER_TEMP}/template.tar.gz" | awk '{print $1}')
          cat > "${RUNNER_TEMP}/manifest.json" <<EOF
          {
            "version": "${{ steps.ver.outputs.sha }}",
            "publishedAt": "${{ steps.ver.outputs.published_at }}",
            "size": $SIZE,
            "sha256": "$SHA256"
          }
          EOF
          cat "${RUNNER_TEMP}/manifest.json"

      - name: Upload to R2
        env:
          # Authenticate the AWS CLI against R2 without the
          # aws-actions/configure-aws-credentials action — that action runs
          # an STS GetCallerIdentity call which fails against R2 (R2 has no
          # STS endpoint). Setting these env vars is equivalent + works.
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: ${{ secrets.R2_BUCKET }}
          SHA: ${{ steps.ver.outputs.sha }}
        run: |
          set -euo pipefail
          aws s3 cp "${RUNNER_TEMP}/template.tar.gz" "s3://${BUCKET}/template/${SHA}.tar.gz" \
            --content-type application/gzip
          aws s3 cp "${RUNNER_TEMP}/template.tar.gz" "s3://${BUCKET}/template/latest.tar.gz" \
            --content-type application/gzip \
            --cache-control "no-store"
          aws s3 cp README.md "s3://${BUCKET}/template/README.md" \
            --content-type "text/markdown; charset=utf-8" \
            --cache-control "no-store"
          aws s3 cp "${RUNNER_TEMP}/manifest.json" "s3://${BUCKET}/template/manifest.json" \
            --content-type application/json \
            --cache-control "no-store"
